# Mock variant of the Pico W+DHT22 profile for testing without hardware.
[device]
name = "pico_w_dht22"
description = "Raspberry Pi Pico W with DHT22 sensor over MQTT"

[connection]
protocol = "mock"

[[tools]]
name = "get_temperature"
description = "Get the latest temperature reading from the Pico W's DHT22 sensor"
command = "READ_TEMP"

[tools.returns]
type = "float"
unit = "celsius"

[[tools]]
name = "get_humidity"
description = "Get the latest relative humidity reading from the Pico W's DHT22 sensor"
command = "READ_HUMID"

[tools.returns]
type = "float"
unit = "percent"

[[tools]]
name = "get_reading"
description = "Get both temperature (celsius) and humidity (percent) from the Pico W"
command = "READ_ALL"

[tools.returns]
type = "string"

[health]
check_command = "PING"
expected = "PONG"
interval_ms = 15000
