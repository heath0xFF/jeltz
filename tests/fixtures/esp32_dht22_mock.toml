# Mock variant of the ESP32+DHT22 profile for testing without hardware.
[device]
name = "esp32_dht22"
description = "ESP32 with DHT22 temperature and humidity sensor"

[connection]
protocol = "mock"

[[tools]]
name = "get_temperature"
description = "Get current temperature from the DHT22 sensor"
command = "READ_TEMP"

[tools.returns]
type = "float"
unit = "celsius"

[[tools]]
name = "get_humidity"
description = "Get current relative humidity from the DHT22 sensor"
command = "READ_HUMID"

[tools.returns]
type = "float"
unit = "percent"

[[tools]]
name = "get_reading"
description = "Get both temperature (celsius) and humidity (percent) in one call"
command = "READ_ALL"

[tools.returns]
type = "string"

[[tools]]
name = "get_status"
description = "Check if the ESP32 and sensor are operating normally"
command = "STATUS"

[tools.returns]
type = "string"

[health]
check_command = "PING"
expected = "PONG"
interval_ms = 10000
