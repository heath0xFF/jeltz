# ESP32 + DHT22 — Temperature/Humidity Station
#
# An ESP32 dev board with a DHT22 connected via GPIO, exposing sensor
# readings over USB serial. This is the most common DIY temperature
# monitoring setup.
#
# Wiring:
#   DHT22 VCC  → ESP32 3.3V
#   DHT22 DATA → ESP32 GPIO4 (with 10K pull-up to 3.3V)
#   DHT22 GND  → ESP32 GND
#
# The ESP32 should run firmware that accepts text commands over serial
# and returns plain text responses. Example Arduino sketch:
#
#   void loop() {
#     if (Serial.available()) {
#       String cmd = Serial.readStringUntil('\n');
#       cmd.trim();
#       if (cmd == "READ_TEMP") Serial.println(dht.readTemperature());
#       else if (cmd == "READ_HUMID") Serial.println(dht.readHumidity());
#       else if (cmd == "READ_ALL") {
#         Serial.print(dht.readTemperature());
#         Serial.print(",");
#         Serial.println(dht.readHumidity());
#       }
#       else if (cmd == "PING") Serial.println("PONG");
#       else if (cmd == "STATUS") Serial.println("OK");
#     }
#   }

[device]
name = "esp32_dht22"
description = "ESP32 with DHT22 temperature and humidity sensor"

[connection]
protocol = "serial"
port = "/dev/ttyUSB0"
baud_rate = 115200
# DHT22 reads take ~2s; allow headroom for the full round-trip
timeout_ms = 3000

[[tools]]
name = "get_temperature"
description = "Get current temperature from the DHT22 sensor"
command = "READ_TEMP"

[tools.returns]
type = "float"
unit = "celsius"

[[tools]]
name = "get_humidity"
description = "Get current relative humidity from the DHT22 sensor"
command = "READ_HUMID"

[tools.returns]
type = "float"
unit = "percent"

[[tools]]
name = "get_reading"
description = "Get both temperature (celsius) and humidity (percent) in one call"
command = "READ_ALL"

[tools.returns]
type = "string"

[[tools]]
name = "get_status"
description = "Check if the ESP32 and sensor are operating normally"
command = "STATUS"

[tools.returns]
type = "string"

[health]
check_command = "PING"
expected = "PONG"
interval_ms = 10000
